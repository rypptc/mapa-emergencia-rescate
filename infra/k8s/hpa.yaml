# HorizontalPodAutoscaler — escala los PODS (no los nodos; de eso se encarga el
# cluster-autoscaler, ver infra/k8s/cluster-autoscaler.yaml). HPA + CA trabajan juntos:
# HPA pide más réplicas → si no caben, sus pods quedan Pending → el CA arranca un
# VPS efímero → los pods se programan. Al bajar la carga, HPA quita réplicas y el
# CA destruye el VPS vacío.
#
# Señal: CPU (memoria NO se usa como señal de escalado — es laggy y destructiva;
# la memoria es un problema de sizing, ya acotada por requests/limits). Target
# 60% de la CPU *solicitada* (250m) → escala al superar ~150m/pod sostenido.
#
# Comportamiento: subir RÁPIDO (picos de emergencia), bajar LENTO (evita flapping
# y matar pods que aún drenan). Ventana de bajada 300s.
#
# Requiere metrics-server (ya instalado en el clúster).
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: mapa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # reacciona ya ante un pico
      policies:
        - type: Percent
          value: 100 # puede duplicar réplicas por paso
          periodSeconds: 30
        - type: Pods
          value: 4 # o +4 pods por paso, lo que sea mayor
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300 # baja con calma (5 min sin presión)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: mapa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  # La API la consumen terceros (scrapers/integraciones) de forma impredecible:
  # techo más alto que web para absorber ráfagas sin tocar el render del front.
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 6
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin
  namespace: mapa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin
  # El panel lo usa un grupo acotado de rescatistas/coordinadores: techo bajo.
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
