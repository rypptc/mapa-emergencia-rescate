# Template del Secret de entorno runtime (app-env), consumido por el Deployment
# `api` (BACKEND) y el `migrate-worker` vía envFrom. NO commitees valores reales.
# Crea el Secret real fuera de banda (kubectl / CI desde GitHub secrets), p.ej.:
#
#   kubectl -n mapa create secret generic app-env \
#     --from-literal=DATABASE_URL='postgres://user:pass@<pg-private-ip>:5432/app' \
#     --from-literal=VALKEY_URL='redis://<valkey-private-ip>:6379' \
#     --from-literal=CORS_ORIGINS='https://terremotovenezuela.app' \
#     --from-literal=IP_SALT='<cadena-aleatoria-larga>' \
#     --from-literal=ADMIN_PASSWORD='<password-admin>' \
#     --from-literal=TURNSTILE_SECRET_KEY='<secret-turnstile>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Las claves espejan backend/src/config/env.ts. En Hetzner, DATABASE_URL apunta
# al Postgres privado por TCP (el proyecto YA NO usa Neon → sin DB_DRIVER). El
# FRONTEND no necesita este Secret: sus NEXT_PUBLIC_* se inlinean en BUILD.
apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: mapa
type: Opaque
stringData:
  # --- Obligatorios -------------------------------------------------------
  DATABASE_URL: "REPLACE_ME" # Postgres TCP del VPS privado de Hetzner
  # CORS: orígenes del frontend permitidos (coma-separados). El front llama al
  # backend cross-origin (api.terremoto… → terremoto…), así que SIN esto el
  # browser bloquea toda respuesta.
  CORS_ORIGINS: "https://terremotovenezuela.app"

  # --- Recomendados -------------------------------------------------------
  # Valkey: sin esto el rate-limit cae a memoria (degradado por-pod, no rompe).
  VALKEY_URL: "redis://REPLACE_ME:6379"
  # Cabecera de IP de confianza. Detrás de Cloudflare DEBE ser cf-connecting-ip
  # (el cliente NO la falsifica). El backend ya usa este default; déjalo salvo
  # que tu proxy reescriba otra cabecera no-falsificable. NUNCA x-forwarded-for.
  TRUSTED_IP_HEADER: "cf-connecting-ip"
  # Sal para hashear IPs antes de persistirlas (columnas ip_hash). Genera una
  # cadena aleatoria larga y NO la rotes sin migrar/backfill (rompe la dedup).
  IP_SALT: "REPLACE_ME"
  # Secreto HMAC para hashear documentos/cédulas de pacientes importados. Genera
  # una cadena aleatoria larga y NO la rotes sin estrategia de backfill.
  PATIENT_DOCUMENT_HASH_SECRET: "REPLACE_ME"
  # Auth admin (header x-admin-token). Sin esto, las rutas admin quedan cerradas.
  ADMIN_PASSWORD: "REPLACE_ME"
  # Cloudflare Turnstile: prueba de humanidad en writes públicos. Sin el secret,
  # requireHuman se DESACTIVA (deja pasar) — necesario en prod para matar el spam.
  TURNSTILE_SECRET_KEY: "REPLACE_ME"

  # --- Opcionales (proxy de analítica OpenPanel, route /api/op) -----------
  OPENPANEL_API_URL: "https://api.openpanel.dev"
  OPENPANEL_CLIENT_SECRET: ""

  # --- Opcionales (OCR/ICR de importación de pacientes, Minimax VL) -------
  # DESACTIVADO por defecto: SIN MINIMAX_API_KEY el proveedor no se construye y
  # el ingest OCR/ICR responde 501 (no auto-aplica). El token es server-side y
  # NUNCA se loguea ni se expone. Endpoint/modelo/prompt/límites parametrizables.
  # MINIMAX_API_KEY: "REPLACE_ME"
  # MINIMAX_OCR_BASE_URL: "https://api.minimax.io/v1"
  # MINIMAX_OCR_MODEL: "MiniMax-M3"
  # MINIMAX_OCR_MAX_TOKENS: "2048"
  # MINIMAX_OCR_TIMEOUT_MS: "30000"
  # MINIMAX_OCR_PROMPT: ""
