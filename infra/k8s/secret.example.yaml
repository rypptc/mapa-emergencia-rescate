# Template for the app's runtime env Secret (app-env), consumed by the
# Deployment via envFrom. DO NOT commit real values. Create the real Secret
# out-of-band (kubectl / CI from GitHub secrets), e.g.:
#
#   kubectl -n mapa create secret generic app-env \
#     --from-literal=DATABASE_URL='postgres://user:pass@<pg-private-ip>:5432/app' \
#     --from-literal=DB_DRIVER='tcp' \
#     --from-literal=IP_SALT='<cadena-aleatoria-larga>' \
#     --from-literal=NEXT_PUBLIC_OPENPANEL_CLIENT_ID='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Keys mirror .env.example. On Hetzner, DATABASE_URL points at the private
# Postgres VPS over TCP. DB_DRIVER=tcp pins the node-postgres driver explicitly
# so the choice never depends on URL autodetection (Vercel/Neon prod pins
# DB_DRIVER=neon on its side). See lib/db.ts chooseDriver().
apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: mapa
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  DB_DRIVER: "tcp"
  # NUNCA pongas x-forwarded-for aquí: el cliente lo falsifica y anula TODO el
  # rate-limit por IP (brute-force del login admin incluido). Déjalo vacío para
  # caer a x-real-ip (lo pone la plataforma/LB, no el cliente), o ponlo a la
  # cabecera que TU proxy de confianza reescribe y que el cliente no controla.
  TRUSTED_IP_HEADER: ""
  # Sal para hashear IPs antes de persistirlas (columnas ip_hash). Genera una
  # cadena aleatoria larga y NO la rotes sin migrar/backfill (rompe la dedup).
  IP_SALT: "REPLACE_ME"
  NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ""
  OPENPANEL_API_URL: ""
  NEXT_PUBLIC_OPENPANEL_DASHBOARD_URL: ""
  NEXT_PUBLIC_OPENPANEL_PRODUCTION_HOST: ""
