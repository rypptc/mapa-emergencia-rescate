# Namespace + DOS Services (LoadBalancer) — TEMPLATE.
#
# Cada Service de tipo LoadBalancer hace que el cloud-controller-manager de
# Hetzner aprovisione un LB real apuntando a los pods por la red privada:
#   - web -> selector tier=web -> LB "mapa-lb"     -> terremoto… (dominio público)
#   - api -> selector tier=api -> LB "mapa-api-lb"  -> api.terremoto… (terceros)
#
# Dos LB = aislamiento total: una tormenta de tráfico de API pega solo al LB+pods
# de api (su propio HPA, su propio blast radius), nunca al render del front.
#
# Placeholders rellenados por el workflow (envsubst) por entorno y por tier:
#   ${WEB_TLS_ANNOTATIONS} ${API_TLS_ANNOTATIONS}  (los puertos son estáticos)
# (no se escriben en $-form en los comentarios para que envsubst no los toque).
#
#   target=staging -> TLS en Cloudflare (proxied). LB habla HTTP plano :80.
#   target=prod    -> TLS en el LB. Cert managed Let's Encrypt en :443 por host.
#
# Ver el paso "Apply manifests" en .github/workflows/deploy-hetzner.yml.
apiVersion: v1
kind: Namespace
metadata:
  name: mapa
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: mapa
  annotations:
    load-balancer.hetzner.cloud/location: "hel1"
    load-balancer.hetzner.cloud/use-private-ip: "true"
    load-balancer.hetzner.cloud/name: "mapa-lb"
    # NO fijar health-check-port (ver nota histórica: el CCM usa el NodePort).
    load-balancer.hetzner.cloud/health-check-protocol: "http"
    load-balancer.hetzner.cloud/health-check-http-path: "/api/readyz"
    load-balancer.hetzner.cloud/health-check-interval: "15s"
    load-balancer.hetzner.cloud/health-check-retries: "2"
    load-balancer.hetzner.cloud/uses-proxyprotocol: "false"
${WEB_TLS_ANNOTATIONS}
spec:
  type: LoadBalancer
  selector:
    app: mapa
    tier: web
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 3000
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: mapa
  annotations:
    load-balancer.hetzner.cloud/location: "hel1"
    load-balancer.hetzner.cloud/use-private-ip: "true"
    load-balancer.hetzner.cloud/name: "mapa-api-lb"
    load-balancer.hetzner.cloud/health-check-protocol: "http"
    load-balancer.hetzner.cloud/health-check-http-path: "/api/readyz"
    load-balancer.hetzner.cloud/health-check-interval: "15s"
    load-balancer.hetzner.cloud/health-check-retries: "2"
    load-balancer.hetzner.cloud/uses-proxyprotocol: "false"
${API_TLS_ANNOTATIONS}
spec:
  type: LoadBalancer
  selector:
    app: mapa
    tier: api
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 3000
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
