# Namespace + Service.
#
# The Service of type LoadBalancer is what makes the Hetzner cloud-controller
# -manager (installed by hetzner-k3s) auto-provision a real Hetzner Load
# Balancer pointing at the app pods over the private network. The annotations
# configure TLS termination (managed Let's Encrypt) and the health check at
# the LB, mirroring the Hermes target-group health check.
#
# Domain: vzla-terremoto.dreamit.software
# The LB terminates TLS with a managed Let's Encrypt cert for that hostname and
# redirects http->https. After the first deploy, point a DNS A/AAAA record for
# vzla-terremoto.dreamit.software at the LB's public IP (printed by the deploy);
# the managed cert only issues once DNS resolves to the LB.
apiVersion: v1
kind: Namespace
metadata:
  name: mapa
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: mapa
  annotations:
    # Provision the LB in the same location as the nodes.
    load-balancer.hetzner.cloud/location: "nbg1"
    # Route to pods over the private network (no public pod IPs).
    load-balancer.hetzner.cloud/use-private-ip: "true"
    load-balancer.hetzner.cloud/name: "mapa-lb"
    # Active health check — the LB only sends traffic to Ready pods.
    load-balancer.hetzner.cloud/health-check-protocol: "http"
    load-balancer.hetzner.cloud/health-check-port: "3000"
    load-balancer.hetzner.cloud/health-check-http-path: "/api/readyz"
    load-balancer.hetzner.cloud/health-check-interval: "15s"
    load-balancer.hetzner.cloud/health-check-retries: "2"
    # --- Managed TLS (Let's Encrypt) for the domain ---
    load-balancer.hetzner.cloud/hostname: "vzla-terremoto.dreamit.software"
    load-balancer.hetzner.cloud/protocol: "https"
    load-balancer.hetzner.cloud/certificate-type: "managed"
    # The :443 listener carries the cert; redirect plain http:80 -> https.
    load-balancer.hetzner.cloud/http-redirect-https: "true"
    load-balancer.hetzner.cloud/uses-proxyprotocol: "false"
spec:
  type: LoadBalancer
  selector:
    app: mapa
  ports:
    # https (TLS terminated at the LB) -> app on 3000
    - name: https
      protocol: TCP
      port: 443
      targetPort: 3000
    # http kept so the LB can 301-redirect it to https
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
