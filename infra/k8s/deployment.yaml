# App Deployments — DOS tiers, DOS imágenes distintas (tras el split monorepo):
#   - web : FRONTEND (Next standalone, pura UI, :3000). Llama al backend por URL
#           absoluta (NEXT_PUBLIC_API_URL). Lo enruta el LB público (terremoto…).
#   - api : BACKEND (Express, :8080). Sirve TODA la superficie /api (front + 3os).
#           Lo enruta un LB aparte (api.terremoto…).
#
# Dos Deployments + dos Services = AISLAMIENTO de blast-radius y escalado
# independiente (HPA propio por tier, ver hpa.yaml): una ráfaga de tráfico a la
# API no puede ahogar el render del front durante una emergencia. El front ya NO
# sirve /api: habla con el backend cross-origin (el backend habilita CORS).
#
# Zero-downtime (ambos tiers):
#   - maxUnavailable:0 / maxSurge:1 -> el pod nuevo debe estar Ready ANTES de
#     quitar uno viejo. Siempre >=1 sirviendo.
#   - readiness: el BACKEND prueba /api/readyz (chequea DB). El FRONTEND no tiene
#     /api/readyz (es pura UI) -> probe TCP al :3000 (server.js arriba = listo).
#   - cluster-autoscaler (infra/k8s/cluster-autoscaler.yaml) arranca VPS efímeros cuando
#     los pods nuevos no caben, y destruye los viejos al drenar (graceful).
#
# CI parchea por-deploy: web -> imagen -frontend:<sha>, api -> -backend:<sha>.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: mapa
  labels:
    app: mapa
    tier: web
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mapa
      tier: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mapa
        tier: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      # Reparte réplicas entre nodos (resiliencia + ayuda al autoscaler a
      # justificar un nodo nuevo). `preferred`, no `required`, para no bloquear
      # el scheduling si hay un solo nodo durante un cold-start.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mapa
                    tier: web
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 40
      containers:
        # FRONTEND (Next standalone). CI parchea el tag a -frontend:<sha>.
        - name: app
          image: ghcr.io/OWNER/REPO-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: app-env
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=640"
          # El frontend es pura UI: no tiene /api/readyz. Probe TCP — si el
          # server.js de Next acepta conexiones en :3000, está listo.
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "768Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mapa
  labels:
    app: mapa
    tier: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mapa
      tier: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mapa
        tier: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mapa
                    tier: api
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 40
      containers:
        # BACKEND (Express, :8080). CI parchea el tag a -backend:<sha>.
        - name: app
          image: ghcr.io/OWNER/REPO-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: app-env
          env:
            # La API no hace render React, así que necesita menos heap que web.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
          livenessProbe:
            httpGet:
              path: /api/readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              memory: "640Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
---
# admin : PANEL ADMIN (Next standalone, microservicio aparte del sitio público).
# Lo usan rescatistas/coordinadores. Habla con el backend SOLO server-side (su
# BFF) por la red interna del clúster; el navegador llama same-origin al BFF.
# Réplicas bajas (no es tráfico público masivo). CI parchea el tag a -admin:<sha>.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: mapa
  labels:
    app: mapa
    tier: admin
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mapa
      tier: admin
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mapa
        tier: admin
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mapa
                    tier: admin
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 40
      containers:
        # PANEL ADMIN (Next standalone). CI parchea el tag a -admin:<sha>.
        - name: app
          image: ghcr.io/OWNER/REPO-admin:latest
          ports:
            - containerPort: 3000
          # SIN envFrom app-env a propósito (least-privilege): el panel NO usa la
          # DB/Valkey/Turnstile ni ADMIN_PASSWORD — solo habla con el backend por
          # su BFF. Inyectar esos secretos aquí ampliaría el blast-radius sin
          # razón. Todo lo que el admin lee va EXPLÍCITO abajo. PORT/HOSTNAME/
          # NODE_ENV los fija el Dockerfile.
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
            # El BFF del admin llama al backend por la red interna del clúster.
            - name: EMERGENCY_API_URL
              value: "http://api.mapa.svc.cluster.local"
            # Prod = HTTPS: la cookie de sesión va Secure.
            - name: COOKIE_SECURE
              value: "true"
            - name: SESSION_MAX_AGE_SECONDS
              value: "43200"
          # El admin SÍ tiene /api/health (BFF) desacoplado de upstreams.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              memory: "640Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
