# App Deployments — el MISMO image de Next.js desplegado como DOS tiers:
#   - web : sirve UI/SSR + (también responde /api porque es el mismo server.js).
#           Lo enruta el LB público (terremoto…).
#   - api : sirve la superficie /api para consumidores EXTERNOS (scrapers,
#           integraciones). Lo enruta un LB aparte (api.terremoto…).
#
# ¿Por qué dos Deployments del mismo image y no dos servicios/código? Next.js
# (standalone) sirve TODO desde un solo server.js; no hay "backend" que extraer.
# Separarlos en dos Deployments + dos Services da AISLAMIENTO de blast-radius y
# escalado independiente (HPA propio por tier, ver hpa.yaml): una ráfaga de un
# consumidor de API no puede ahogar el render del front durante una emergencia.
# Cero cambios de código, cero CORS para el front (sigue usando /api same-origin).
#
# Zero-downtime (ambos tiers):
#   - maxUnavailable:0 / maxSurge:1 -> el pod nuevo debe estar Ready ANTES de
#     quitar uno viejo. Siempre >=1 sirviendo.
#   - readinessProbe /api/readyz -> el LB solo enruta a pods que pasan el check
#     de DB. Durante un rollout, el LB drena el viejo (readiness deja de pasar en
#     preStop) y solo manda tráfico al nuevo.
#   - cluster-autoscaler (infra/tofu/autoscaler.tf) arranca VPS efímeros cuando
#     los pods nuevos no caben, y destruye los viejos al drenar (graceful).
#
# CI parchea el tag del image por-deploy con `kubectl set image` en AMBOS.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: mapa
  labels:
    app: mapa
    tier: web
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mapa
      tier: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mapa
        tier: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      # Reparte réplicas entre nodos (resiliencia + ayuda al autoscaler a
      # justificar un nodo nuevo). `preferred`, no `required`, para no bloquear
      # el scheduling si hay un solo nodo durante un cold-start.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mapa
                    tier: web
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 40
      containers:
        - name: app
          image: ghcr.io/OWNER/REPO:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: app-env
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=640"
          livenessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              memory: "768Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mapa
  labels:
    app: mapa
    tier: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: mapa
      tier: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mapa
        tier: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mapa
                    tier: api
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 40
      containers:
        - name: app
          image: ghcr.io/OWNER/REPO:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: app-env
          env:
            # La API no hace render React, así que necesita menos heap que web.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
          livenessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              memory: "640Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
