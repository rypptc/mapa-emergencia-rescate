# Entorno LOCAL completo de la arquitectura v2: frontend (Next) + backend
# (Express) + Postgres + Valkey, reflejando prod (tier web + tier api separados).
#
#   docker compose up --build -d     # frontend :3000, backend :8080, db :5432
#   docker compose logs -f backend
#   docker compose down              # parar (CONSERVA los datos del volumen)
#   docker compose down -v           # parar + BORRAR datos
#
# Datos reales de prod viven en el volumen `postgres_data` (cargados por dump SSH).
# Persisten entre up/down; solo `down -v` los borra.
#
# El servicio one-shot `migrate-seed` aplica migraciones y siembra datos DEMO
# (SOLO local) antes de que arranque el backend. Es idempotente y se niega a
# correr si detecta datos NO-demo (no mezcla fixtures con un dump real).
#
# Wiring API (como en prod): el frontend llama al backend por URL ABSOLUTA
# (NEXT_PUBLIC_API_URL). El browser corre fuera de la red de Docker, así que la
# URL es http://localhost:8080 (NO el nombre de servicio). NEXT_PUBLIC_* se
# inlinea en build → va como build-arg. El backend habilita CORS para :3000.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mapa_app
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapa_app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Job one-shot: aplica migraciones + seed (capacidades, rol admin, superadmin)
  # ANTES de que el backend arranque. Espeja el Job gateado de prod
  # (infra/k8s/migrate-job.yaml). Luego siembra datos DEMO locales (salvo
  # SKIP_SEED=1). Corre y termina (restart: no); el backend depende de que
  # complete con éxito.
  migrate-seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c 'npm run migrate && { [ "$$SKIP_SEED" = "1" ] && echo "[seed] omitido (SKIP_SEED=1)" || npm run seed; }'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://mapa_app:localdev@db:5432/app
      MIGRATIONS_DIR: ../infra/db/migrations
      JWT_SECRET: local-dev-jwt-secret-not-for-prod-0123456789
      SEED_ADMIN_EMAIL: oaba.dev@gmail.com
      SEED_ADMIN_PASSWORD: localadminpass123
      SKIP_SEED: "${SKIP_SEED:-0}"
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Stack LOCAL → development: relaja los fail-fast de prod (JWT_SECRET largo,
      # COOKIE_SECURE) que aplican solo con NODE_ENV=production. La imagen fija
      # production por defecto; aquí lo sobreescribimos para el entorno local.
      NODE_ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://mapa_app:localdev@db:5432/app
      VALKEY_URL: redis://valkey:6379
      # CORS: el frontend (browser en localhost:3000) llama cross-origin al backend.
      CORS_ORIGINS: http://localhost:3000
      TRUSTED_IP_HEADER: "" # dev: cae a req.ip
      IP_SALT: localdev-salt
      PATIENT_DOCUMENT_HASH_SECRET: local-dev-patient-document-hash-secret-0123456789
      ADMIN_PASSWORD: localadmin
      # Turnstile DESACTIVADO en local (sin secret → requireHuman deja pasar).
      # --- Auth api/public/* (JWT cookie + Bearer) ---
      JWT_SECRET: local-dev-jwt-secret-not-for-prod-0123456789
      COOKIE_SECURE: "false" # http local; en prod va a true (validado por env)
      # Base para los links de invitación/reset. Es el PANEL admin (ahí aterriza
      # quien acepta una invitación), no el sitio público. Local: :3001; en prod
      # pon ADMIN_BASE_URL=https://admin.terremotovenezuela.app en tu .env.
      APP_BASE_URL: "${ADMIN_BASE_URL:-http://localhost:3001}"
      # SMTP: se interpola desde .env (de la raíz). Sin .env quedan vacíos y el
      # backend cae a modo dev (el invite devuelve el link; el OTP se loguea).
      # Pon los SMTP_* reales en .env para enviar correos localmente.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-Mapa Emergencia <noreply@dreamit.software>}"
      # OCR/ICR (Minimax VL) DESACTIVADO en local por defecto: sin MINIMAX_API_KEY
      # el proveedor no se construye y el ingest OCR/ICR responde 501. Para probarlo
      # localmente, exporta MINIMAX_API_KEY en tu entorno (NUNCA commitees el token):
      # MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      # MINIMAX_OCR_MODEL: ${MINIMAX_OCR_MODEL:-MiniMax-M3}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate-seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL absoluta del backend para el BROWSER (no la red de Docker).
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
        # Base pública del CDN de fotos (no sensible).
        NEXT_PUBLIC_R2_PUBLIC_BASE: "https://bucket-vzla-terremoto.dreamit.software"
    environment:
      # SSR / Server Components dentro de Docker llaman al backend por la RED
      # interna (nombre de servicio), NO localhost. Sin esto, server-api.ts cae a
      # localhost:8080 dentro del contenedor frontend y el fetch SSR (p.ej.
      # /hospitales/[id], sitemap) falla con ECONNREFUSED.
      INTERNAL_API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Panel de administración (rescatistas) — microservicio Next standalone aparte
  # del sitio público. En prod va en admin.terremotovenezuela.app con su propio
  # LB; aquí corre en :3001. Habla con el backend SOLO server-side (su BFF) por
  # la red interna; el navegador llama same-origin al BFF del admin.
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      # El BFF del admin llama al backend por la red interna de Docker.
      EMERGENCY_API_URL: http://backend:8080
      # Cookie de sesión httpOnly. En local (http) NO puede ser Secure o el
      # navegador la descarta; en prod (https) va a true. Espeja el backend.
      COOKIE_SECURE: "false"
      # TTL de la cookie de sesión del BFF (seg). Espeja JWT_TTL_SECONDS.
      SESSION_MAX_AGE_SECONDS: "43200"
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  valkey_data:
