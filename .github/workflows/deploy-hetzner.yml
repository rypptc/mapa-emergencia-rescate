# Deploy to Hetzner (k3s) — DEPLOY ONLY.
#
# Trigger:
#   - push a `main`         -> auto-deploy a STAGING (CD).
#   - workflow_dispatch     -> deploy manual; eliges target (staging | prod).
#                              (prod SIEMPRE es un botón deliberado, nunca auto.)
#
# Hace: gate de verificación (tsc + eslint + openapi) -> build app+worker ->
# push a GHCR -> sube estáticos a R2 -> aplica manifests -> migración de esquema
# gateada -> roll zero-downtime.
#
# Las tareas de infraestructura (provision, recreate-master, plan, migrate
# enqueue) NO viven aquí a propósito — córrelas a mano (tofu/kubectl).
#
# RESTRICCIÓN: solo corre desde `main`. El filtro `branches:` de workflow_dispatch
# NO se respeta; el guard real es `if: github.ref == 'refs/heads/main'` a nivel de
# job. `push` ya está acotado a `branches: [main]`. Refuerza con branch protection.
#
# Pre-requisitos (una vez, con provision fuera de este workflow): cluster k3s,
# secret KUBECONFIG (base64), y los secrets app-env + migrate-env creados.
#
# Zero-downtime: lo imponen los manifests (maxUnavailable:0 + readinessProbe
# /api/readyz) y lo confirma `kubectl rollout status`.
name: Deploy to Hetzner (k3s)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Environment (LB TLS profile)"
        type: choice
        default: staging
        options:
          - staging   # TLS at Cloudflare (proxied); LB serves the CF origin cert
          - prod      # TLS at the LB (Hetzner managed cert) on :443

permissions:
  contents: read
  packages: write       # push images to GHCR
  deployments: write

# IMAGE is computed at runtime (lowercased) — GHCR/Docker require all-lowercase
# repository names and ${{ github.repository }} can contain uppercase.

jobs:
  # Gate: nada se despliega si el código no compila/lint/genera la spec.
  verify:
    name: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Typecheck (app)
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck (worker)
        run: npx tsc --noEmit -p worker/tsconfig.json
      - name: Lint
        run: npm run lint
      - name: Generate OpenAPI spec (must succeed)
        run: npm run openapi

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: verify
    # SOLO desde main. workflow_dispatch deja elegir rama en la UI, pero este
    # guard rechaza cualquier ejecución que no venga de main.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image name (lowercase)
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # Resuelve el target: push->staging; dispatch->lo elegido (default staging).
      # prod NUNCA sale de un push automático.
      - name: Resolve target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> "$GITHUB_ENV"
          else
            echo "TARGET=staging" >> "$GITHUB_ENV"
          fi

      - name: Show inputs
        run: |
          echo "event  = ${{ github.event_name }}"
          echo "target = $TARGET"
          echo "image  = ${{ env.IMAGE }}:${{ github.sha }}"
          echo "actor  = ${{ github.actor }}"
          echo "ref    = ${{ github.ref }}"

      # ---------------------------------------------------------------
      # 1. Build the immutable app + worker images, push to GHCR (:<sha> + :latest)
      # ---------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (app)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime # explicit: `worker` is the LAST stage; without this
          # docker would build the worker image and push it as the app tag.
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_ASSET_PREFIX=${{ secrets.NEXT_PUBLIC_ASSET_PREFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (worker)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE }}-worker:${{ github.sha }}
            ${{ env.IMAGE }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------
      # 2. Configure kubectl from the KUBECONFIG secret (set once at provision).
      # ---------------------------------------------------------------
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m0755 kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure kubectl
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::error::KUBECONFIG secret not set — provision the cluster first."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl get nodes

      # migrate-env: secret the migration worker + the gated migrate Job need
      # (NEON + R2). Re-applied each deploy so it stays in sync. No-op if unset.
      - name: Ensure migrate-env secret
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_STATIC_BUCKET: ${{ secrets.R2_STATIC_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        run: |
          set -euo pipefail
          if [ -z "${NEON_DATABASE_URL:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "Neon/R2 secrets unset — skipping migrate-env."
            exit 0
          fi
          kubectl create namespace mapa --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n mapa create secret generic migrate-env \
            --from-literal=NEON_DATABASE_URL="$NEON_DATABASE_URL" \
            --from-literal=R2_ENDPOINT="$R2_ENDPOINT" \
            --from-literal=R2_STATIC_BUCKET="$R2_STATIC_BUCKET" \
            --from-literal=R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            --from-literal=R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            --from-literal=R2_PUBLIC_BASE="$R2_PUBLIC_BASE" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Upload the freshly-built /_next/static to R2 BEFORE rolling (push-then-roll),
      # additive (NEVER --delete: old chunks must survive for in-flight sessions),
      # content-hashed + immutable so no invalidation needed. Fixes version-skew.
      - name: Upload static assets to R2 CDN
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_STATIC_BUCKET: ${{ secrets.R2_STATIC_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_STATIC_BUCKET:-}" ]; then
            echo "R2 secrets unset — skipping static upload."
            exit 0
          fi
          IMAGE="${{ env.IMAGE }}:${{ github.sha }}"
          docker pull "$IMAGE"
          CID=$(docker create "$IMAGE")
          rm -rf /tmp/next-static && mkdir -p /tmp/next-static
          docker cp "$CID":/app/.next/static/. /tmp/next-static/
          docker rm "$CID"
          aws s3 sync /tmp/next-static "s3://$R2_STATIC_BUCKET/_next/static" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --checksum-algorithm CRC32 \
            --no-progress
          echo "Synced $(find /tmp/next-static -type f | wc -l) files to r2://$R2_STATIC_BUCKET/_next/static"

      # ---------------------------------------------------------------
      # 3. Apply manifests (Service rendered per target), gated migrate, roll.
      # ---------------------------------------------------------------
      - name: Apply manifests
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          set -euo pipefail
          # ONE service.yaml serves both envs; envsubst fills the TLS profile.
          HTTP_PORT=$(printf '    - name: http\n      protocol: TCP\n      port: 80\n      targetPort: 3000')
          if [ "$TARGET" = "prod" ]; then
            : "${PROD_HOST:?prod target needs the PROD_HOST secret (the public hostname)}"
            export TLS_ANNOTATIONS=$(printf '    load-balancer.hetzner.cloud/protocol: "https"\n    load-balancer.hetzner.cloud/certificate-type: "managed"\n    load-balancer.hetzner.cloud/http-managed-certificate-domains: "%s"\n    load-balancer.hetzner.cloud/http-redirect-https: "true"' "$PROD_HOST")
            export LB_PORTS=$(printf '    - name: https\n      protocol: TCP\n      port: 443\n      targetPort: 3000\n%s' "$HTTP_PORT")
          else
            export TLS_ANNOTATIONS=$(printf '    load-balancer.hetzner.cloud/protocol: "https"\n    load-balancer.hetzner.cloud/http-certificates: "cf-origin-dreamit"\n    load-balancer.hetzner.cloud/http-redirect-https: "true"')
            export LB_PORTS=$(printf '    - name: https\n      protocol: TCP\n      port: 443\n      targetPort: 3000\n%s' "$HTTP_PORT")
          fi
          envsubst '${TLS_ANNOTATIONS} ${LB_PORTS}' < infra/k8s/service.yaml > /tmp/service.rendered.yaml
          echo "--- rendered Service (target=$TARGET) ---"
          cat /tmp/service.rendered.yaml

          kubectl apply -f /tmp/service.rendered.yaml
          kubectl apply -f infra/k8s/deployment.yaml
          # Migration worker Deployment (only if migrate-env exists).
          if kubectl -n mapa get secret migrate-env >/dev/null 2>&1; then
            sed "s#ghcr.io/OWNER/REPO-worker:latest#${{ env.IMAGE }}-worker:${{ github.sha }}#" \
              infra/k8s/worker-deployment.yaml | kubectl apply -f -
          else
            echo "migrate-env not present — skipping worker Deployment."
          fi

      # Gated Drizzle migrations BEFORE the roll: new pods never start against an
      # out-of-date schema. Uses the WORKER image (has node_modules + tsx + .sql);
      # idempotent + expand-contract. If it fails, the app does NOT roll.
      - name: Apply DB migrations (gated)
        run: |
          set -euo pipefail
          JOB="migrate-${{ github.sha }}"
          kubectl -n mapa delete job "$JOB" --ignore-not-found
          sed -e "s#^  name: migrate\$#  name: ${JOB}#" \
              -e "s#ghcr.io/OWNER/REPO-worker:latest#${{ env.IMAGE }}-worker:${{ github.sha }}#" \
            infra/k8s/migrate-job.yaml | kubectl apply -f -
          if ! kubectl -n mapa wait --for=condition=complete "job/${JOB}" --timeout=180s; then
            echo "::error::Migration Job did not complete. Logs:"
            kubectl -n mapa logs "job/${JOB}" --tail=-1 || true
            exit 1
          fi
          kubectl -n mapa logs "job/${JOB}" --tail=-1 || true

      - name: Roll to the new image (zero-downtime)
        run: |
          set -euo pipefail
          kubectl -n mapa set image deployment/app \
            app=${{ env.IMAGE }}:${{ github.sha }}
          kubectl -n mapa rollout status deployment/app --timeout=300s
          if kubectl -n mapa get deploy migrate-worker >/dev/null 2>&1; then
            kubectl -n mapa set image deployment/migrate-worker \
              worker=${{ env.IMAGE }}-worker:${{ github.sha }}
            kubectl -n mapa rollout status deployment/migrate-worker --timeout=180s || \
              echo "::warning::migrate-worker roll lagging — check kubectl -n mapa get pods"
          fi

      - name: Rollback hint on failure
        if: ${{ failure() }}
        run: |
          echo "::warning::Deploy failed. To revert: kubectl -n mapa rollout undo deployment/app"

      - name: Done
        run: echo "✅ deploy ($TARGET) finished."
