# Deploy to Hetzner (k3s).
#
# Manually triggered (workflow_dispatch), same convention as boahaus/argo.
#   action=plan   -> build the image, push to GHCR, but DON'T touch the cluster.
#   action=deploy -> build+push, then roll the app (zero-downtime) via kubectl.
#   ensure_cluster=true -> create the k3s cluster first if it doesn't exist.
#   bootstrap_confirm="create-infra" -> ONE-TIME: create the whole stateful tier
#     (private net, firewall, Postgres VPS+volume+DBs, Valkey VPS) + the cluster,
#     then PRINT the secrets to paste back. See the "NUKE AFTER FIRST RUN" block.
#
# Zero-downtime is enforced by the manifests (maxUnavailable:0 + readinessProbe
# /api/readyz) and confirmed here by `kubectl rollout status`, which blocks
# until the new pods are Ready and the old ones drained — or fails the deploy.
name: Deploy to Hetzner (k3s)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        default: plan
        options:
          - plan      # build + push image only; no cluster changes
          - deploy    # build + push, then roll the app
      ensure_cluster:
        description: "Create the k3s cluster if it doesn't exist yet"
        type: boolean
        default: false
      bootstrap_confirm:
        description: "ONE-TIME bootstrap of stateful tier — type create-infra to arm it (then DELETE the bootstrap block)"
        type: string
        default: ""

permissions:
  contents: read
  packages: write       # push images to GHCR
  deployments: write    # GitHub Deployments / ledger (later)

# IMAGE is computed at runtime (lowercased) — GHCR/Docker require all-lowercase
# repository names and ${{ github.repository }} can contain uppercase (the owner
# "ArturoRiosMock" does). See the "Compute image name" step.

jobs:
  deploy:
    name: Build & ${{ inputs.action }}
    runs-on: ubuntu-latest
    # Repo-level secrets (no GitHub Environment configured). Add
    # `environment: production` here later if you want reviewer gates.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image name (lowercase)
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Show inputs
        run: |
          echo "action         = ${{ inputs.action }}"
          echo "ensure_cluster = ${{ inputs.ensure_cluster }}"
          echo "image          = ${{ env.IMAGE }}:${{ github.sha }}"
          echo "actor          = ${{ github.actor }}"

      # ---------------------------------------------------------------
      # 1. Build the immutable app image and push to GHCR, tagged :<sha>
      #    (+ :latest for convenience). Runs for BOTH plan and deploy so a
      #    plan still proves the build is green.
      # ---------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # actor can be uppercase; GHCR login is case-insensitive but lowercase
          # is safest.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Plan stops here
        if: ${{ inputs.action == 'plan' }}
        run: |
          echo "PLAN complete — image built & pushed, cluster untouched."
          echo "Run again with action=deploy to roll it out."

      # ---------------------------------------------------------------
      # 2. (deploy only) Ensure cluster, then roll.
      # ---------------------------------------------------------------
      - name: Install hcloud + hetzner-k3s + kubectl
        if: ${{ inputs.action == 'deploy' || inputs.bootstrap_confirm == 'create-infra' }}
        run: |
          # kubectl
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m0755 kubectl /usr/local/bin/kubectl
          # hcloud CLI
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar xz
          sudo install -m0755 hcloud /usr/local/bin/hcloud
          kubectl version --client

      # ╔═══════════════════════════════════════════════════════════════════╗
      # ║  >>> NUKE AFTER FIRST RUN — BEGIN one-time stateful bootstrap <<<   ║
      # ║                                                                     ║
      # ║  Creates the PETS (private net, firewall, Postgres VPS+volume+DBs,  ║
      # ║  Valkey VPS) once, idempotently (create-or-skip). Armed only when   ║
      # ║  bootstrap_confirm == "create-infra". After the first successful    ║
      # ║  run: copy the printed secrets into repo secrets, then DELETE       ║
      # ║  everything between these NUKE markers so a routine deploy can      ║
      # ║  never touch the database. Pre-set secrets it consumes:             ║
      # ║    HCLOUD_TOKEN, SSH_PUBLIC_KEY, POSTGRES_USER, POSTGRES_PASSWORD,  ║
      # ║    POSTGRES_APP_DB, POSTGRES_IMPORTED_DB, VALKEY_PASSWORD           ║
      # ╚═══════════════════════════════════════════════════════════════════╝
      - name: "[bootstrap] Private network"
        if: ${{ inputs.bootstrap_confirm == 'create-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          if hcloud network describe mapa-net >/dev/null 2>&1; then
            echo "network mapa-net exists — skip"
          else
            hcloud network create --name mapa-net --ip-range 10.0.0.0/16
            hcloud network add-subnet mapa-net --type cloud --network-zone eu-central --ip-range 10.0.0.0/16
          fi

      - name: "[bootstrap] Firewall (deny public to DB/Valkey)"
        if: ${{ inputs.bootstrap_confirm == 'create-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          # Allow SSH from anywhere (tighten to your IP later); DB/Valkey ports
          # are NOT opened publicly — only the private subnet reaches them, which
          # private traffic does by default (firewall governs PUBLIC ingress).
          if hcloud firewall describe mapa-db-fw >/dev/null 2>&1; then
            echo "firewall mapa-db-fw exists — skip"
          else
            hcloud firewall create --name mapa-db-fw
            hcloud firewall add-rule mapa-db-fw --direction in --protocol tcp --port 22 --source-ips 0.0.0.0/0 --source-ips ::/0
          fi

      - name: "[bootstrap] Postgres VPS + volume + role + databases"
        if: ${{ inputs.bootstrap_confirm == 'create-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          PG_USER: ${{ secrets.POSTGRES_USER }}
          PG_PASS: ${{ secrets.POSTGRES_PASSWORD }}
          PG_APP_DB: ${{ secrets.POSTGRES_APP_DB }}
          PG_IMPORTED_DB: ${{ secrets.POSTGRES_IMPORTED_DB }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if hcloud server describe mapa-postgres >/dev/null 2>&1; then
            echo "server mapa-postgres exists — skip create"
          else
            # Register the SSH public key (idempotent name).
            hcloud ssh-key describe mapa-key >/dev/null 2>&1 || \
              hcloud ssh-key create --name mapa-key --public-key "$SSH_PUBLIC_KEY"

            # cloud-init: install Postgres, create the role + app/imported DBs,
            # bind to the private IP only. Heredoc expands the secrets in.
            cat > pg-cloud-init.yaml <<EOF
          #cloud-config
          package_update: true
          packages: [postgresql]
          runcmd:
            - sudo -u postgres psql -c "CREATE USER ${PG_USER} WITH ENCRYPTED PASSWORD '${PG_PASS}';"
            - sudo -u postgres psql -c "CREATE DATABASE ${PG_APP_DB} OWNER ${PG_USER};"
            - sudo -u postgres psql -c "CREATE DATABASE ${PG_IMPORTED_DB} OWNER ${PG_USER};"
            - PGDIR=\$(ls -d /etc/postgresql/*/main); echo "listen_addresses = '*'" >> \$PGDIR/postgresql.conf
            - PGDIR=\$(ls -d /etc/postgresql/*/main); echo "host all ${PG_USER} 10.0.0.0/16 scram-sha-256" >> \$PGDIR/pg_hba.conf
            - systemctl restart postgresql
          EOF

            hcloud server create \
              --name mapa-postgres \
              --type cx22 --image debian-12 --location nbg1 \
              --ssh-key mapa-key \
              --network mapa-net \
              --firewall mapa-db-fw \
              --user-data-from-file pg-cloud-init.yaml
            # Data volume (survives a server rebuild). Mount/migrate PGDATA to it
            # in a follow-up; created here so it exists from day one.
            hcloud volume create --name mapa-pgdata --size 40 --server mapa-postgres --automount --format ext4
          fi

      - name: "[bootstrap] Valkey VPS"
        if: ${{ inputs.bootstrap_confirm == 'create-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          VALKEY_PASS: ${{ secrets.VALKEY_PASSWORD }}
        run: |
          set -euo pipefail
          if hcloud server describe mapa-valkey >/dev/null 2>&1; then
            echo "server mapa-valkey exists — skip create"
          else
            cat > valkey-cloud-init.yaml <<EOF
          #cloud-config
          package_update: true
          packages: [valkey-server]
          runcmd:
            - sed -i "s/^# *requirepass .*/requirepass ${VALKEY_PASS}/" /etc/valkey/valkey.conf
            - sed -i "s/^appendonly .*/appendonly yes/" /etc/valkey/valkey.conf
            - sed -i "s/^bind .*/bind 0.0.0.0/" /etc/valkey/valkey.conf
            - systemctl restart valkey-server
          EOF
            hcloud server create \
              --name mapa-valkey \
              --type cx22 --image debian-12 --location nbg1 \
              --ssh-key mapa-key \
              --network mapa-net \
              --firewall mapa-db-fw \
              --user-data-from-file valkey-cloud-init.yaml
          fi

      - name: "[bootstrap] Print secrets to paste (option A)"
        if: ${{ inputs.bootstrap_confirm == 'create-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          PG_IP=$(hcloud server describe mapa-postgres -o format='{{ (index .PrivateNet 0).IP }}')
          VK_IP=$(hcloud server describe mapa-valkey  -o format='{{ (index .PrivateNet 0).IP }}')
          echo "::notice::Bootstrap done. Set these as repo secrets (values masked in logs):"
          echo "  DATABASE_URL          = postgres://<POSTGRES_USER>:<POSTGRES_PASSWORD>@${PG_IP}:5432/<POSTGRES_APP_DB>"
          echo "  IMPORTED_DATABASE_URL = postgres://<POSTGRES_USER>:<POSTGRES_PASSWORD>@${PG_IP}:5432/<POSTGRES_IMPORTED_DB>"
          echo "  VALKEY_URL            = redis://:<VALKEY_PASSWORD>@${VK_IP}:6379"
          echo "  KUBECONFIG            = base64 of ./kubeconfig after the cluster step (base64 -w0 kubeconfig)"
          echo "Postgres private IP: ${PG_IP}"
          echo "Valkey   private IP: ${VK_IP}"
      # ╔═══════════════════════════════════════════════════════════════════╗
      # ║  >>> NUKE AFTER FIRST RUN — END one-time stateful bootstrap <<<     ║
      # ╚═══════════════════════════════════════════════════════════════════╝

      - name: Ensure cluster exists
        if: ${{ (inputs.action == 'deploy' && inputs.ensure_cluster) || inputs.bootstrap_confirm == 'create-infra' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          # hetzner-k3s names cluster nodes mapa-master-* / mapa-app-*. Skip the
          # DB/Valkey servers (also mapa-*) by matching the role suffixes.
          if hcloud server list -o noheader -o columns=name | grep -qE '^mapa-(master|app|pool)'; then
            echo "Cluster 'mapa' already present — skipping create."
          else
            echo "No cluster found — creating with hetzner-k3s..."
            docker run --rm \
              -e HCLOUD_TOKEN="$HCLOUD_TOKEN" \
              -v "$PWD/infra:/infra" -v "$HOME/.ssh:/root/.ssh:ro" \
              vitobotta/hetzner-k3s:latest create --config /infra/cluster.yaml
            echo "::notice::Cluster created. Set KUBECONFIG secret: base64 -w0 infra/kubeconfig"
          fi

      - name: Configure kubectl
        # `secrets` can't be used in an `if:` expression, so gate on action only
        # and check KUBECONFIG presence in shell (mapped to an env var). On the
        # FIRST bootstrap run the secret won't exist yet — the step no-ops and
        # tells you to set it, then a normal deploy run uses it.
        if: ${{ inputs.action == 'deploy' }}
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::warning::KUBECONFIG secret not set yet — skipping kubectl config."
            echo "Set it (base64 -w0 infra/kubeconfig) then re-run action=deploy."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl get nodes

      - name: Apply manifests
        if: ${{ inputs.action == 'deploy' }}
        run: |
          set -euo pipefail
          # Skip cleanly if kubectl isn't configured (KUBECONFIG not set yet on a
          # first bootstrap run) — the previous step already warned.
          [ -f "$HOME/.kube/config" ] || { echo "No kubeconfig — skipping apply."; exit 0; }
          # Namespace + Service (LB). Deployment is applied then image-pinned.
          kubectl apply -f infra/k8s/service.yaml
          kubectl apply -f infra/k8s/deployment.yaml

      - name: Roll to the new image (zero-downtime)
        if: ${{ inputs.action == 'deploy' }}
        run: |
          set -euo pipefail
          [ -f "$HOME/.kube/config" ] || { echo "No kubeconfig — skipping roll."; exit 0; }
          kubectl -n mapa set image deployment/app \
            app=${{ env.IMAGE }}:${{ github.sha }}
          # Blocks until new pods are Ready (passed /api/readyz) and old pods
          # drained. Fails the job (and the deploy) if the roll stalls.
          kubectl -n mapa rollout status deployment/app --timeout=300s

      - name: Rollback hint on failure
        if: ${{ failure() && inputs.action == 'deploy' }}
        run: |
          echo "::warning::Roll failed. To revert: kubectl -n mapa rollout undo deployment/app"

      - name: Done
        run: echo "✅ ${{ inputs.action }} finished."
