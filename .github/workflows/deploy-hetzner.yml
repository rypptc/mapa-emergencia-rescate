# Deploy to Hetzner (k3s) — DEPLOY ONLY.
#
# Trigger:
#   - PUSH a `main`         -> auto-deploy a STAGING (CD). Un merge de PR (incl.
#                              desde fork) aterriza como push a main y corre con
#                              secrets (contexto del repo base). El "no desplegar
#                              en push crudo/bypass" lo impone el ruleset de main.
#   - workflow_dispatch     -> deploy manual; eliges target (staging | prod).
#                              (prod SIEMPRE es un botón deliberado, nunca auto.)
#
# Hace: gate de verificación (backend/frontend typecheck + lint frontend) ->
# build frontend+backend -> push a GHCR -> sube estáticos a R2 -> aplica
# manifests -> migración de esquema gateada -> roll zero-downtime.
#
# Las tareas de infraestructura (provision, recreate-master, plan, migrate
# enqueue) NO viven aquí a propósito — córrelas a mano (tofu/kubectl).
#
# RESTRICCIÓN: el gate real es el `if` a nivel de job
# (event push && ref == refs/heads/main, o dispatch). El ruleset "proteger main"
# exige PR + review de code-owner + check Build & Test, así que a main solo llega
# código revisado — por eso "push a main" equivale a "PR mergeado" sin el agujero
# de secrets de los PR de fork.
#
# Pre-requisitos (una vez, con provision fuera de este workflow): cluster k3s,
# secret KUBECONFIG (base64), y los secrets app-env + migrate-env creados.
#
# Zero-downtime: lo imponen los manifests (maxUnavailable:0 + readinessProbe:
# frontend por TCP, backend por /api/readyz) y lo confirma `kubectl rollout status`.
name: Deploy to Hetzner (k3s)

on:
  # Despliega cuando algo aterriza en `main`. Un merge de PR (incluido desde un
  # FORK) crea un push a main, y ESE run corre en el contexto del repo base con
  # acceso a secrets — a diferencia de `pull_request:closed`, que en PR de fork
  # corre sin secrets (diseño de GitHub) y rompía el login a GHCR. El push filtra
  # solo `main`, así que los commits a ramas de PR NO disparan deploy (un solo
  # run por merge, sin doble-disparo). El "no desplegar en push crudo" lo impone
  # el ruleset de protección de `main` (PR + review obligatorios), no el trigger.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Environment (LB TLS profile)"
        type: choice
        default: staging
        options:
          - staging   # TLS at Cloudflare (proxied); LB serves the CF origin cert
          - prod      # TLS at the LB (Hetzner managed cert) on :443

permissions:
  contents: read
  packages: write       # push images to GHCR
  deployments: write

# Concurrencia: a lo sumo UN deploy a la vez. cancel-in-progress:false NUNCA
# aborta un deploy en vuelo (toca migraciones + roll de pods; cancelarlo a medias
# dejaría estado inconsistente). Si llegan más merges mientras corre, GitHub
# mantiene UN run pendiente y descarta los intermedios: el último pendiente se
# construye sobre el `main` más nuevo y reemplaza a los viejos → se despliega el
# estado final una sola vez (deploy = converger al último main, no reproducir
# cada commit). Grupo fijo (no por-ref) porque todos los deploys van al MISMO
# entorno y compiten por el mismo cluster.
concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

# IMAGE is computed at runtime (lowercased) — GHCR/Docker require all-lowercase
# repository names and ${{ github.repository }} can contain uppercase.

jobs:
  # Gate: nada se despliega si backend/frontend no typecheckean o el frontend no
  # pasa lint.
  verify:
    name: verify
    runs-on: ubuntu-latest
    # Corre solo si: (a) push a main (un merge de PR aterriza aquí), o (b)
    # dispatch manual. El filtro `push: branches: [main]` ya acota a main; el
    # check de ref es defensivo.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          # Tras el split monorepo hay DOS lockfiles (frontend/ + backend/); el
          # cache de npm los toma a ambos como clave.
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      # `npm ci` es estricto y aborta si el lock está desincronizado con este npm
      # (drift de @esbuild/* optional-deps). main está protegido y el pipeline no
      # puede empujar un lock corregido, así que caemos a `npm install`. El lock
      # commiteado sigue siendo autoritativo cuando está en sync.
      # --- BACKEND (Express API + worker) -------------------------------------
      - name: Install deps (backend)
        working-directory: backend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Typecheck backend (app)
        working-directory: backend
        run: npm run typecheck
      - name: Typecheck backend (worker)
        working-directory: backend
        run: npx tsc --noEmit -p worker/tsconfig.json
      # --- FRONTEND (Next, pura UI) -------------------------------------------
      - name: Install deps (frontend)
        working-directory: frontend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  # Gate del PANEL ADMIN (Turborepo aparte, requiere Node 24). Job separado para
  # no mezclar versiones de Node con el verify de frontend/backend.
  verify-admin:
    name: verify-admin
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - name: Install deps (admin)
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Lint admin
        run: npm run lint
      - name: Typecheck admin
        run: npm run typecheck
      - name: Test admin
        run: npm run test

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [verify, verify-admin]
    # Lee los secrets del Environment `production-hetzner` (sube con
    # ./upload-github-secrets.sh -f .env -e production-hetzner). Da además reglas
    # de protección de entorno (revisores/branches) sobre el deploy a prod.
    environment: production-hetzner
    # Mismo gate que verify: push a main (un merge de PR aterriza aquí), o
    # dispatch manual. El "no desplegar en push crudo / bypass de admin" lo impone
    # el ruleset de protección de main (PR + review obligatorios), no el trigger.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # En push a main, github.sha YA es el commit de main; fijamos ref: main
          # explícito para ser inequívocos y reproducibles.
          ref: main

      - name: Compute image name (lowercase) + SHA
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          # HEAD real de main (lo que acabamos de hacer checkout) para taggear la
          # imagen — coincide con github.sha en push.
          echo "SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      # Resuelve el target: merge a main -> staging; dispatch -> lo elegido
      # (default staging). prod NUNCA sale de un merge automático.
      - name: Resolve target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> "$GITHUB_ENV"
          else
            echo "TARGET=staging" >> "$GITHUB_ENV"
          fi

      - name: Show inputs
        run: |
          echo "event  = ${{ github.event_name }}"
          echo "target = $TARGET"
          echo "image  = ${{ env.IMAGE }}:${{ env.SHA }}"
          echo "actor  = ${{ github.actor }}"
          echo "ref    = ${{ github.ref }}"

      # ---------------------------------------------------------------
      # 1. Build the immutable frontend + backend images, push to GHCR
      #    (:<sha> + :latest). El backend image sirve API + worker + migrate.
      # ---------------------------------------------------------------
      # Push a GHCR con un PAT clásico (write:packages) en vez del GITHUB_TOKEN
      # del run: tras mover el repo a la org `terremotovenezuela`, el GITHUB_TOKEN
      # no tiene permiso de escritura sobre el package de la org ("installation not
      # allowed to Write organization package"). El PAT del owner sí. Username =
      # dueño del token (GHCR_PULL_USER); password = TOKEN_GITHUB_PACKAGES.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # --- frontend (Next standalone, pure UI) ---------------------------------
      # context = frontend/. El browser llama al backend por URL ABSOLUTA, así que
      # NEXT_PUBLIC_API_URL se inlinea en BUILD y apunta al dominio del backend de
      # prod (api.terremotovenezuela.app). El backend habilita CORS para el front.
      - name: Build and push (frontend)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          target: runtime
          push: true
          # build-push-action@v6 adjunta attestations (provenance/SBOM) por
          # defecto, que se PUSHEAN como manifests extra. Con GITHUB_TOKEN en una
          # org eso dispara "installation not allowed to Write organization
          # package" aunque la imagen principal sí se permita. Las desactivamos.
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}-frontend:${{ env.SHA }}
            ${{ env.IMAGE }}-frontend:latest
          build-args: |
            APP_BUILD_SHA=${{ env.SHA }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.terremotovenezuela.app' }}
            NEXT_PUBLIC_R2_PUBLIC_BASE=${{ vars.NEXT_PUBLIC_R2_PUBLIC_BASE }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_ASSET_PREFIX=${{ secrets.NEXT_PUBLIC_ASSET_PREFIX }}
            NEXT_PUBLIC_OPENPANEL_CLIENT_ID=${{ secrets.NEXT_PUBLIC_OPENPANEL_CLIENT_ID }}
            NEXT_PUBLIC_OPENPANEL_PRODUCTION_HOST=${{ vars.NEXT_PUBLIC_OPENPANEL_PRODUCTION_HOST || 'terremotovenezuela.app' }}
            NEXT_PUBLIC_OPENPANEL_DASHBOARD_URL=${{ secrets.NEXT_PUBLIC_OPENPANEL_DASHBOARD_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- backend (Express API). MISMA imagen sirve API + worker + migrate
      # (práctica estándar: un artefacto, web/worker/migrate se distinguen por el
      # `command`). context = raíz (el backend importa infra/db/schema). ---------
      - name: Build and push (backend)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          target: runtime
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}-backend:${{ env.SHA }}
            ${{ env.IMAGE }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- admin (PANEL admin, Next standalone). context = admin/. El BFF llama
      # al backend en RUNTIME (EMERGENCY_API_URL inyectado por el Deployment), así
      # que NO va como build-arg. Solo el SHA (anti version-skew) y el asset prefix
      # se fijan en build. -------------------------------------------------------
      - name: Build and push (admin)
        uses: docker/build-push-action@v7
        with:
          context: ./admin
          target: runtime
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}-admin:${{ env.SHA }}
            ${{ env.IMAGE }}-admin:latest
          build-args: |
            APP_BUILD_SHA=${{ env.SHA }}
            # assetPrefix del panel = base CDN + sufijo /admin (sus estáticos van a
            # s3://BUCKET/admin/_next/static, separados de los del frontend). Sin
            # base CDN configurada -> vacío -> el pod sirve sus propios estáticos.
            NEXT_PUBLIC_ASSET_PREFIX=${{ vars.NEXT_PUBLIC_R2_PUBLIC_BASE && format('{0}/admin', vars.NEXT_PUBLIC_R2_PUBLIC_BASE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------
      # 2. Configure kubectl from the KUBECONFIG secret (set once at provision).
      # ---------------------------------------------------------------
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m0755 kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure kubectl
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::error::KUBECONFIG secret not set — provision the cluster first."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl get nodes

      # GHCR es privado -> el clúster necesita un secret de pull. Usamos un PAT
      # clásico (read:packages, SIN expiración) en `secrets.GHCR_PULL_TOKEN`, NO
      # el GITHUB_TOKEN del run: ese expira en 1h, así que los pods nuevos que se
      # creen después (rollout, scale-up, Jobs) fallaban con 403 al hacer pull.
      # Los manifests referencian `imagePullSecrets: ghcr-pull`.
      - name: Ensure ghcr-pull secret
        run: |
          set -euo pipefail
          kubectl create namespace mapa --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n mapa create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username='${{ secrets.GHCR_PULL_USER }}' \
            --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
            --docker-email='ci@users.noreply.github.com' \
            --dry-run=client -o yaml | kubectl apply -f -

      # migrate-env: secret the migration worker + the gated migrate Job need
      # (NEON + R2). Re-applied each deploy so it stays in sync. No-op if unset.
      - name: Ensure migrate-env secret
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_STATIC_BUCKET: ${{ secrets.R2_STATIC_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        run: |
          set -euo pipefail
          if [ -z "${NEON_DATABASE_URL:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "Neon/R2 secrets unset — skipping migrate-env."
            exit 0
          fi
          kubectl create namespace mapa --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n mapa create secret generic migrate-env \
            --from-literal=NEON_DATABASE_URL="$NEON_DATABASE_URL" \
            --from-literal=R2_ENDPOINT="$R2_ENDPOINT" \
            --from-literal=R2_STATIC_BUCKET="$R2_STATIC_BUCKET" \
            --from-literal=R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            --from-literal=R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            --from-literal=R2_PUBLIC_BASE="$R2_PUBLIC_BASE" \
            --dry-run=client -o yaml | kubectl apply -f -

      # cluster-autoscaler-hcloud: token de Hetzner + HCLOUD_CLUSTER_CONFIG (JSON
      # base64 con el cloud-init que une nodos nuevos a k3s — el MISMO join que
      # usan los workers, ver infra/tofu/cloud-init/k3s-agent.yaml.tftpl). El CA
      # lo lee para arrancar VPS efímeros. NO se commitea ningún secreto.
      - name: Ensure cluster-autoscaler secret
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          K3S_TOKEN: ${{ secrets.K3S_TOKEN }}
          MASTER_PRIVATE_IP: "10.0.1.5"
        run: |
          set -euo pipefail
          if [ -z "${HCLOUD_TOKEN:-}" ] || [ -z "${K3S_TOKEN:-}" ]; then
            echo "HCLOUD_TOKEN/K3S_TOKEN unset — skipping cluster-autoscaler secret."
            exit 0
          fi
          kubectl create namespace mapa --dry-run=client -o yaml | kubectl apply -f -
          # cloud-init para nodos nuevos: idéntico al k3s-agent de tofu (join por
          # IP privada del master + token + cloud-provider=external para el CCM).
          CLOUD_INIT=$(cat <<EOF
          #cloud-config
          write_files:
            - path: /etc/rancher/k3s/config.yaml
              content: |
                server: "https://${MASTER_PRIVATE_IP}:6443"
                token: "${K3S_TOKEN}"
                flannel-iface: "enp7s0"
                kubelet-arg:
                  - "cloud-provider=external"
          runcmd:
            - curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL=stable K3S_URL="https://${MASTER_PRIVATE_IP}:6443" K3S_TOKEN="${K3S_TOKEN}" sh -s - agent
          EOF
          )
          CLOUD_INIT_B64=$(printf '%s' "$CLOUD_INIT" | base64 -w0)
          # HCLOUD_CLUSTER_CONFIG: JSON con la imagen y el cloud-init por pool.
          # El nombre de pool (mapa-pool) DEBE coincidir con --nodes=...:mapa-pool.
          CLUSTER_CONFIG=$(cat <<EOF
          {"imagesForArch":{"amd64":"debian-12","arm64":""},"nodeConfigs":{"mapa-pool":{"cloudInit":"${CLOUD_INIT_B64}","labels":{"role":"k3s-worker-autoscaled"}}}}
          EOF
          )
          CLUSTER_CONFIG_B64=$(printf '%s' "$CLUSTER_CONFIG" | base64 -w0)
          kubectl -n kube-system create secret generic cluster-autoscaler-hcloud \
            --from-literal=token="$HCLOUD_TOKEN" \
            --from-literal=cluster-config="$CLUSTER_CONFIG_B64" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Server-side runtime secrets (NO NEXT_PUBLIC_*): OpenPanel proxy,
      # contraseña admin, CORS cross-origin y Turnstile server-side.
      # app-env tiene TODAS las vars de runtime (DATABASE_URL, VALKEY_URL, R2_*,
      # ...) desde provision, así que PATCHEAMOS solo estas claves con un strategic
      # merge — nunca recreamos el secret (borraría el resto). stringData deja que
      # kubectl haga el base64. Cada clave se omite si su secret de GH no está seteado.
      #
      # CORS_ORIGINS + TURNSTILE_SECRET_KEY son NUEVAS del split/seguridad (no
      # existían en el monolito same-origin): CORS_ORIGINS deja que el front llame
      # cross-origin; TURNSTILE_SECRET_KEY activa requireHuman (anti-bot).
      - name: Patch runtime secrets into app-env
        env:
          OPENPANEL_CLIENT_SECRET: ${{ secrets.OPENPANEL_CLIENT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          # --- Motor de auth api/public/* (NUEVO). JWT_SECRET y COOKIE_SECURE son
          # OBLIGATORIOS en prod: config/env.ts hace fail-fast (process.exit) si
          # faltan, así que SIN ellos el api y el Job migrate crashean al arrancar.
          # SEED_ADMIN_* crean el superadmin semilla (idempotente). SMTP_* habilitan
          # los emails de invitación/reset; sin ellos degradan (link en respuesta).
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          # --- Réplica pública (hub SQL, RFC 0006). OPCIONALES: si su secret de GH
          # no está, la clave se omite y la gestión de réplica queda OFF (503), sin
          # afectar al resto. Se setean tras `tofu apply` del hub + el runbook.
          # HCLOUD_TOKEN ya existe como secret (tofu); el backend lo reusa para el
          # firewall del hub — se añade aquí para que el api también lo vea.
          HUB_ADMIN_DATABASE_URL: ${{ secrets.HUB_ADMIN_DATABASE_URL }}
          HUB_PUBLIC_HOST: ${{ secrets.HUB_PUBLIC_HOST }}
          HUB_DB_NAME: ${{ secrets.HUB_DB_NAME }}
          HUB_FIREWALL_ID: ${{ secrets.HUB_FIREWALL_ID }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          if ! kubectl -n mapa get secret app-env >/dev/null 2>&1; then
            echo "::warning::app-env secret not found — create it at provision time. Skipping."
            exit 0
          fi
          # Construimos el patch JSON solo con las claves que SÍ tienen valor
          # (omitimos las vacías para no pisar con "" lo que ya esté en el secret).
          patch=$(KEYS="OPENPANEL_CLIENT_SECRET ADMIN_PASSWORD CORS_ORIGINS TURNSTILE_SECRET_KEY JWT_SECRET COOKIE_SECURE APP_BASE_URL SEED_ADMIN_EMAIL SEED_ADMIN_PASSWORD SMTP_HOST SMTP_PORT SMTP_USERNAME SMTP_PASSWORD SMTP_FROM HUB_ADMIN_DATABASE_URL HUB_PUBLIC_HOST HUB_DB_NAME HUB_FIREWALL_ID HCLOUD_TOKEN" \
            python3 -c 'import json,os; ks=os.environ["KEYS"].split(); print(json.dumps({k:os.environ[k] for k in ks if os.environ.get(k)}))')
          if [ "$patch" = '{}' ]; then
            echo "No runtime secrets to patch."
            exit 0
          fi
          echo "Patching app-env keys: $(printf '%s' "$patch" | python3 -c 'import json,sys; print(", ".join(json.load(sys.stdin).keys()))')"
          kubectl -n mapa patch secret app-env --type merge \
            -p "{\"stringData\": ${patch}}"

      # Upload the freshly-built /_next/static to R2 BEFORE rolling (push-then-roll),
      # additive (NEVER --delete: old chunks must survive for in-flight sessions),
      # content-hashed + immutable so no invalidation needed. Fixes version-skew.
      - name: Upload static assets to R2 CDN
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_STATIC_BUCKET: ${{ secrets.R2_STATIC_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_STATIC_BUCKET:-}" ]; then
            echo "R2 secrets unset — skipping static upload."
            exit 0
          fi
          IMAGE="${{ env.IMAGE }}-frontend:${{ env.SHA }}"
          docker pull "$IMAGE"
          CID=$(docker create "$IMAGE")
          rm -rf /tmp/next-static && mkdir -p /tmp/next-static
          docker cp "$CID":/app/.next/static/. /tmp/next-static/
          docker rm "$CID"
          aws s3 sync /tmp/next-static "s3://$R2_STATIC_BUCKET/_next/static" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --checksum-algorithm CRC32 \
            --no-progress
          echo "Synced $(find /tmp/next-static -type f | wc -l) files to r2://$R2_STATIC_BUCKET/_next/static"

      # Igual que el frontend, pero para el PANEL admin → prefijo SEPARADO
      # `admin/_next/static` (su assetPrefix es <R2_PUBLIC_BASE>/admin). Mismo
      # bucket, carpeta aparte: los chunks de los dos apps no se mezclan. Additive
      # (sin --delete), content-hashed + immutable. App plana: el static vive en
      # /app/.next/static dentro de la imagen del admin.
      - name: Upload admin static assets to R2 CDN
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_STATIC_BUCKET: ${{ secrets.R2_STATIC_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_STATIC_BUCKET:-}" ]; then
            echo "R2 secrets unset — skipping admin static upload."
            exit 0
          fi
          IMAGE="${{ env.IMAGE }}-admin:${{ env.SHA }}"
          docker pull "$IMAGE"
          CID=$(docker create "$IMAGE")
          rm -rf /tmp/admin-static && mkdir -p /tmp/admin-static
          docker cp "$CID":/app/.next/static/. /tmp/admin-static/
          docker rm "$CID"
          aws s3 sync /tmp/admin-static "s3://$R2_STATIC_BUCKET/admin/_next/static" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --checksum-algorithm CRC32 \
            --no-progress
          echo "Synced $(find /tmp/admin-static -type f | wc -l) files to r2://$R2_STATIC_BUCKET/admin/_next/static"

      # ---------------------------------------------------------------
      # 3. Apply manifests (Service rendered per target), gated migrate, roll.
      # ---------------------------------------------------------------
      - name: Apply manifests
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          set -euo pipefail
          # --- Limpieza del tier LEGACY (monolito pre-split) -----------------
          # Antes del split había UN Deployment `app` + UN Service `app`, ambos
          # con el LB name "mapa-lb". El nuevo Service `web` reclama EL MISMO
          # "mapa-lb": dos Services sobre un LB de Hetzner NO está soportado (el
          # CCM los reconcilia uno contra otro y se pisan; ver hcloud-ccm #232/#249).
          # `kubectl apply` es aditivo y nunca borró el `app` viejo, así que quedó
          # peleando por el LB. Lo borramos AQUÍ, ANTES de aplicar el Service web,
          # para que `web` quede como ÚNICO dueño de "mapa-lb" (conserva la IP .170,
          # el DNS no cambia). Idempotente: --ignore-not-found.
          kubectl -n mapa delete deployment app --ignore-not-found
          kubectl -n mapa delete service app --ignore-not-found
          # service.yaml define DOS Services (web + api) con puertos estáticos;
          # envsubst solo rellena el perfil TLS. La API usa EL MISMO perfil que
          # web: en prod, PROD_HOST debe cubrir los hostnames servidos por ambos
          # LB (por ejemplo terremotovenezuela.app,api.terremotovenezuela.app).
          if [ "$TARGET" = "prod" ]; then
            : "${PROD_HOST:?prod target needs the PROD_HOST secret (the public hostname)}"
            export WEB_TLS_ANNOTATIONS=$(printf '    load-balancer.hetzner.cloud/protocol: "https"\n    load-balancer.hetzner.cloud/certificate-type: "managed"\n    load-balancer.hetzner.cloud/http-managed-certificate-domains: "%s"\n    load-balancer.hetzner.cloud/http-redirect-https: "true"' "$PROD_HOST")
          else
            export WEB_TLS_ANNOTATIONS=$(printf '    load-balancer.hetzner.cloud/protocol: "https"\n    load-balancer.hetzner.cloud/http-certificates: "cf-origin-dreamit"\n    load-balancer.hetzner.cloud/http-redirect-https: "true"')
          fi
          # api y admin SIEMPRE replican el perfil de web (sea managed o cf-origin).
          export API_TLS_ANNOTATIONS="$WEB_TLS_ANNOTATIONS"
          export ADMIN_TLS_ANNOTATIONS="$WEB_TLS_ANNOTATIONS"
          envsubst '${WEB_TLS_ANNOTATIONS} ${API_TLS_ANNOTATIONS} ${ADMIN_TLS_ANNOTATIONS}' \
            < infra/k8s/service.yaml > /tmp/service.rendered.yaml
          echo "--- rendered Services (target=$TARGET) ---"
          cat /tmp/service.rendered.yaml

          kubectl apply -f /tmp/service.rendered.yaml
          # web + api Deployments (imagenes separadas, parcheadas en el paso Roll).
          kubectl apply -f infra/k8s/deployment.yaml
          # HPA por tier (web + api). metrics-server ya está en el clúster.
          kubectl apply -f infra/k8s/hpa.yaml
          # Cluster Autoscaler (nodos efímeros) — solo si su secret existe.
          if kubectl -n kube-system get secret cluster-autoscaler-hcloud >/dev/null 2>&1; then
            kubectl apply -f infra/k8s/cluster-autoscaler.yaml
            kubectl -n kube-system rollout restart deploy/cluster-autoscaler
            kubectl -n kube-system rollout status deploy/cluster-autoscaler --timeout=120s
            # GUARDA ANTI-WEDGE: un CA al que le falta un RBAC (p.ej. resource.k8s.io
            # / volumeattachments tras un bump de minor) queda 1/1 Running, 0
            # restarts pero BLOQUEADO en "blocking until caches are synced" — nunca
            # entra al loop, nunca crea VPS, y el deploy pasaba sin enterarse. Aquí
            # exigimos PRUEBA de que el loop arrancó: o registró su node group, o ya
            # corrió un RunOnce. Si en 90s no hay señal, fallamos el deploy y
            # volcamos los "forbidden" del log (el síntoma exacto del RBAC faltante).
            ok=""
            for i in $(seq 1 18); do
              if kubectl -n kube-system logs deploy/cluster-autoscaler --tail=-1 2>/dev/null \
                   | grep -qiE 'Registering [0-9]+ node group|RunOnce|Starting main loop|static_autoscaler'; then
                ok=1; break
              fi
              sleep 5
            done
            if [ -z "$ok" ]; then
              echo "::error::cluster-autoscaler NUNCA entró a su loop (probable RBAC faltante; sigue en 'blocking until caches are synced'). 'forbidden' del log:"
              kubectl -n kube-system logs deploy/cluster-autoscaler --tail=-1 2>/dev/null | grep -i forbidden | tail -20 || true
              exit 1
            fi
            echo "cluster-autoscaler en su loop ✅"
          else
            echo "cluster-autoscaler-hcloud secret missing — skipping CA."
          fi
          # Migration worker Deployment (only if migrate-env exists). Reusa la
          # imagen BACKEND (mismo artefacto que la API; se distingue por command).
          if kubectl -n mapa get secret migrate-env >/dev/null 2>&1; then
            sed "s#ghcr.io/OWNER/REPO-backend:latest#${{ env.IMAGE }}-backend:${{ env.SHA }}#" \
              infra/k8s/worker-deployment.yaml | kubectl apply -f -
          else
            echo "migrate-env not present — skipping worker Deployment."
          fi

      # Gated Drizzle migrations BEFORE the roll: new pods never start against an
      # out-of-date schema. Uses the WORKER image (has node_modules + tsx + .sql);
      # idempotent + expand-contract. If it fails, the app does NOT roll.
      - name: Apply DB migrations (gated)
        run: |
          set -euo pipefail
          JOB="migrate-${{ env.SHA }}"
          kubectl -n mapa delete job "$JOB" --ignore-not-found
          sed -e "s#^  name: migrate\$#  name: ${JOB}#" \
              -e "s#ghcr.io/OWNER/REPO-backend:latest#${{ env.IMAGE }}-backend:${{ env.SHA }}#" \
            infra/k8s/migrate-job.yaml | kubectl apply -f -
          if ! kubectl -n mapa wait --for=condition=complete "job/${JOB}" --timeout=180s; then
            echo "::error::Migration Job did not complete. Logs:"
            kubectl -n mapa logs "job/${JOB}" --tail=-1 || true
            exit 1
          fi
          kubectl -n mapa logs "job/${JOB}" --tail=-1 || true

      - name: Roll to the new image (zero-downtime)
        run: |
          set -euo pipefail
          # Tras el split son DOS imágenes distintas: web=frontend, api=backend.
          # maxUnavailable:0 + readiness garantizan que el LB drene los viejos y
          # solo enrute a los nuevos Ready (cero downtime). rollout status falla
          # el deploy si un tier no converge.
          kubectl -n mapa set image deployment/web \
            app=${{ env.IMAGE }}-frontend:${{ env.SHA }}
          kubectl -n mapa set image deployment/api \
            app=${{ env.IMAGE }}-backend:${{ env.SHA }}
          kubectl -n mapa set image deployment/admin \
            app=${{ env.IMAGE }}-admin:${{ env.SHA }}
          for tier in web api admin; do
            kubectl -n mapa rollout status "deployment/${tier}" --timeout=300s
          done
          # migrate-worker reusa la imagen BACKEND (mismo artefacto, otro command).
          if kubectl -n mapa get deploy migrate-worker >/dev/null 2>&1; then
            kubectl -n mapa set image deployment/migrate-worker \
              worker=${{ env.IMAGE }}-backend:${{ env.SHA }}
            kubectl -n mapa rollout status deployment/migrate-worker --timeout=180s || \
              echo "::warning::migrate-worker roll lagging — check kubectl -n mapa get pods"
          fi

      - name: Rollback hint on failure
        if: ${{ failure() }}
        run: |
          echo "::warning::Deploy failed. To revert: kubectl -n mapa rollout undo deployment/web && kubectl -n mapa rollout undo deployment/api && kubectl -n mapa rollout undo deployment/admin"

      - name: Done
        run: echo "✅ deploy ($TARGET) finished."
